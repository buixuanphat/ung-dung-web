<!DOCTYPE html>
<html>

<head>
    <style>
        img {
            width: 200px;
            height: 300px;
            border-radius: 10px;
            padding: 5px;
        }

        img:hover {
            transform: scale(1.1);
            transition: 0.5s;
        }

        .head-text {
            color: red;
            font-weight: 900;
        }

        .container {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
        }

        .nav-text {
            color: white;
            font-weight: 700;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: none;
            margin-right: 10px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
        }

        .title {
            color: white;
            font-weight: 800;
            font-size: 30px;
            position: absolute;
            left: 20px;
            bottom: 0px;
        }

        .banner {
            background-image: url('./images/movies/movie-banner.jpg');
            height: 300px;
            width: 100%;
            background-size: cover;
            position: relative;
        }

        .cat-text {
            color: white;
            font-weight: 700;
            font-size: 20px;
        }
    </style>
</head>

<body class="container">
    <div class="nav">
        <p class="head-text">NETFLIX</p>
        <div>
            <a href="#" class="nav-text">Trang chủ</a>
            <a href="#" class="nav-text">Phim</a>
            <a href="#" class="nav-text">Thể loại</a>
        </div>

    </div>
    <div class="banner">
        <p class="title">Phim nổi bật hôm nay</p>
    </div>
    <div>
        <p class="cat-text">Xu hướng</p>
        <img src="./images/movies/drishtam2.webp" alt="">
        <img src="./images/movies/encanto.jpeg" alt="">
        <img src="./images/movies/hliched.jpg" alt="">
        <img src="./images/movies/jumanji.webp" alt="">
        <img src="./images/movies/panther.jpg" alt="">
    </div>

    <div>
        <p class="cat-text">Mới phát hành</p>
        <img src="./images/movies/wonka.jpg" alt="">
        <img src="./images/movies/us.jpg" alt="">
        <img src="./images/movies/the-manager.webp" alt="">
        <img src="./images/movies/sinners.jpg" alt="">
        <img src="./images/movies/scary.jpg" alt="">
    </div>

</body>

</html>
