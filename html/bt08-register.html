    <h2 align="center">Đăng kí tham gia diễn đàn</h2>
    <form>
        <table align="center" bgcolor="yellow" cellpadding="10" border="1">
            <tr>
                <td>Tên đăng nhập</td>
                <td><input required type="text" placeholder="Nhập tên đăng nhập" /></td>
            </tr>
            <tr>
                <td>Mật khẩu</td>
                <td><input required type="password" placeholder="Nhập mật khẩu" /></td>
            </tr>
            <tr>
                <td>
                    Nam nữ
                </td>
                <td>
                    <input type="radio" name="male" value="male" /> Nam
                    <input type="radio" name="female" value="female" />Nữ
                </td>
            </tr>
            <tr>
                <td>
                    Ngày sinh
                </td>
                <td><input type="date" /></td>
            </tr>
            <tr>
                <td>
                    Email
                </td>
                <td><input type="email" /></td>
            </tr>
            <tr>
                <td>
                    Ngôn ngữ lập trình yêu thích
                </td>
                <td>
                    <select>
                        <option value="c++">C++</option>
                        <option value="c#">C#</option>
                        <option value="php">PHP</option>
                        <option value="java">Java</option>
                        <option value="python">Python</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    Qui định khi tham gia diễn đàn
                </td>
                <td>
                    <textarea>Bài viết phải nghiêm túc, không chứa quảng cáo, không có nội dung phản cảm</textarea>
                </td>
            </tr>
            <tr>
                <td>

                </td>
                <td>
                    <button>Đăng kí</button>
                    <button>Hủy</button>
                </td>
            </tr>
        </table>
    </form>
